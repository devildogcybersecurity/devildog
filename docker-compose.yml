services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: >
      sh -c "pnpm install &&
      pnpm dev --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      PNPM_STORE_DIR: /pnpm/store
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_pnpm_store:/pnpm/store

volumes:
  app_node_modules:
  app_pnpm_store:
