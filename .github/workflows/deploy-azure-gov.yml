name: Deploy To Azure Government

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-azure-gov-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint, typecheck, and tests
        run: pnpm check

      - name: Build application
        run: pnpm build

      - name: Assemble standalone deployment package
        shell: bash
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -r .next/standalone/. deploy/
          cp -r .next/static deploy/.next/static
          cp -r public deploy/public
          cp pnpm-lock.yaml deploy/pnpm-lock.yaml
          cd deploy
          rm -rf node_modules
          pnpm install --prod --frozen-lockfile --config.node-linker=hoisted
          cat > startup.sh <<'EOF'
          #!/bin/sh
          set -eu
          cd /home/site/wwwroot
          export HOSTNAME=0.0.0.0
          exec node server.js
          EOF
          chmod +x startup.sh

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-service-package
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: app-service-package
          path: deploy

      - name: Azure login (Azure Government)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          environment: AzureUSGovernment
          audience: api://AzureADTokenExchangeUSGov

      - name: Configure startup command
        uses: azure/cli@v2
        with:
          inlineScript: |
            az cloud set --name AzureUSGovernment
            az webapp config set \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --startup-file "/home/site/wwwroot/startup.sh"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: deploy
